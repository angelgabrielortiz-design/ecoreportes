<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoReportes — Panel Municipal</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --verde: #1a5c3a;
    --verde-claro: #2d8a57;
    --acento: #c8f04a;
    --fondo: #0d1f14;
    --fondo2: #132a1a;
    --texto: #e8f5e0;
    --texto2: #8fbb7a;
    --baja: #4ac8f0;
    --media: #f0c84a;
    --alta: #f04a4a;
    --borde: #2a4a32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--fondo2);
    border-bottom: 1px solid var(--borde);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--acento);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    color: var(--texto);
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--acento);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    background: var(--verde);
    color: var(--acento);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--acento);
    letter-spacing: 1px;
  }

  #btn-actualizar {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    background: var(--acento);
    color: var(--fondo);
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  #btn-actualizar:hover { opacity: 0.85; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* PANEL LATERAL */
  .sidebar {
    width: 320px;
    background: var(--fondo2);
    border-right: 1px solid var(--borde);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--borde);
  }

  .sidebar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--texto2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .stat {
    background: var(--fondo);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    border: 1px solid var(--borde);
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--texto2);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat.baja .stat-num { color: var(--baja); }
  .stat.media .stat-num { color: var(--media); }
  .stat.alta .stat-num { color: var(--alta); }

  .filtros {
    padding: 12px 20px;
    border-bottom: 1px solid var(--borde);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filtro-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--borde);
    background: transparent;
    color: var(--texto2);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .filtro-btn.active, .filtro-btn:hover {
    background: var(--verde);
    color: var(--acento);
    border-color: var(--acento);
  }

  .lista-reportes {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .lista-reportes::-webkit-scrollbar { width: 4px; }
  .lista-reportes::-webkit-scrollbar-track { background: transparent; }
  .lista-reportes::-webkit-scrollbar-thumb { background: var(--borde); border-radius: 2px; }

  .reporte-card {
    background: var(--fondo);
    border: 1px solid var(--borde);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }

  .reporte-card:hover {
    border-color: var(--verde-claro);
    transform: translateX(2px);
  }

  .reporte-card.alta { border-left-color: var(--alta); }
  .reporte-card.media { border-left-color: var(--media); }
  .reporte-card.baja { border-left-color: var(--baja); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .card-tipo {
    font-size: 12px;
    font-weight: 600;
    color: var(--texto);
  }

  .card-prioridad {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card-prioridad.alta { background: rgba(240,74,74,0.15); color: var(--alta); }
  .card-prioridad.media { background: rgba(240,200,74,0.15); color: var(--media); }
  .card-prioridad.baja { background: rgba(74,200,240,0.15); color: var(--baja); }

  .card-desc {
    font-size: 11px;
    color: var(--texto2);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-coords {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--verde-claro);
    margin-top: 6px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--texto2);
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; }

  /* MAPA */
  #map {
    flex: 1;
    background: var(--fondo);
  }

  .leaflet-container {
    background: #0d1f14 !important;
  }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--fondo2) !important;
    border: 1px solid var(--borde) !important;
    border-radius: 10px !important;
    color: var(--texto) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
  }

  .leaflet-popup-tip { background: var(--fondo2) !important; }

  .popup-tipo {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--acento);
  }

  .popup-row {
    font-size: 12px;
    margin-bottom: 4px;
    color: var(--texto2);
  }

  .popup-row strong { color: var(--texto); }

  .popup-prioridad {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* CARGANDO */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--fondo);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--borde);
    border-top-color: var(--acento);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--texto2);
    letter-spacing: 1px;
  }

  .no-datos {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--texto2);
    z-index: 500;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>CARGANDO REPORTES...</p>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div class="logo-text">Eco<span>Reportes</span></div>
  </div>
  <div class="header-right">
    <span class="badge">PANEL MUNICIPAL</span>
    <button id="btn-actualizar" onclick="cargarDatos()">↻ Actualizar</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Resumen</div>
      <div class="stats">
        <div class="stat alta">
          <div class="stat-num" id="cnt-alta">0</div>
          <div class="stat-label">Alta</div>
        </div>
        <div class="stat media">
          <div class="stat-num" id="cnt-media">0</div>
          <div class="stat-label">Media</div>
        </div>
        <div class="stat baja">
          <div class="stat-num" id="cnt-baja">0</div>
          <div class="stat-label">Baja</div>
        </div>
      </div>
    </div>

    <div class="filtros">
      <button class="filtro-btn active" onclick="filtrar('todos', this)">Todos</button>
      <button class="filtro-btn" onclick="filtrar('Alcantarilla tapada', this)">Alcantarilla</button>
      <button class="filtro-btn" onclick="filtrar('Centro de acopio lleno', this)">Acopio</button>
      <button class="filtro-btn" onclick="filtrar('Alta', this)">🔴 Alta</button>
    </div>

    <div class="lista-reportes" id="lista"></div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const SHEET_ID = '17ZAvOQE2Vw7sf4OSI9C59fYcx8hdU1-k_s7sBLpVjtg';
  const URL_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Hoja1`;

  let mapa, reportes = [], markers = [], filtroActual = 'todos';

  // Inicializar mapa con tiles oscuros
  mapa = L.map('map', { zoomControl: false }).setView([20.5, -100.5], 10);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(mapa);

  L.control.zoom({ position: 'bottomright' }).addTo(mapa);

  function getPrioridad(p) {
    if (!p) return 'baja';
    p = p.toLowerCase();
    if (p.includes('alta')) return 'alta';
    if (p.includes('media')) return 'media';
    return 'baja';
  }

  function getColor(p) {
    if (p === 'alta') return '#f04a4a';
    if (p === 'media') return '#f0c84a';
    return '#4ac8f0';
  }

  function crearIcono(prioridad) {
    const color = getColor(prioridad);
    return L.divIcon({
      html: `<div style="
        width:14px;height:14px;
        background:${color};
        border:2px solid white;
        border-radius:50%;
        box-shadow:0 0 8px ${color}88;
      "></div>`,
      className: '',
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });
  }

  function parsearCSV(texto) {
    const lineas = texto.trim().split('\n');
    const encabezados = lineas[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
    return lineas.slice(1).map(linea => {
      const vals = linea.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
      const obj = {};
      encabezados.forEach((h, i) => {
        obj[h] = (vals[i] || '').replace(/"/g, '').trim();
      });
      return obj;
    });
  }

  function renderLista(datos) {
    const lista = document.getElementById('lista');
    if (datos.length === 0) {
      lista.innerHTML = `<div class="empty-state"><div class="icon">📍</div><p>No hay reportes</p></div>`;
      return;
    }
    lista.innerHTML = datos.map((r, i) => {
      const p = getPrioridad(r.prioridad);
      const lat = parseFloat(r.latitud);
      const lng = parseFloat(r.longitud);
      const tieneCoords = !isNaN(lat) && !isNaN(lng);
      return `<div class="reporte-card ${p}" onclick="irA(${i})">
        <div class="card-top">
          <div class="card-tipo">${r.tipo || 'Sin tipo'}</div>
          <span class="card-prioridad ${p}">${r.prioridad || 'Baja'}</span>
        </div>
        <div class="card-desc">${r.descripcion || 'Sin descripción'}</div>
        ${tieneCoords ? `<div class="card-coords">${lat.toFixed(4)}, ${lng.toFixed(4)}</div>` : ''}
      </div>`;
    }).join('');
  }

  function renderMapa(datos) {
    markers.forEach(m => mapa.removeLayer(m));
    markers = [];
    const bounds = [];

    datos.forEach((r, i) => {
      const lat = parseFloat(r.latitud);
      const lng = parseFloat(r.longitud);
      if (isNaN(lat) || isNaN(lng)) return;

      const p = getPrioridad(r.prioridad);
      const marker = L.marker([lat, lng], { icon: crearIcono(p) });

      marker.bindPopup(`
        <div class="popup-tipo">${r.tipo || 'Sin tipo'}</div>
        <div class="popup-row"><strong>Descripción:</strong> ${r.descripcion || '—'}</div>
        <div class="popup-row"><strong>Coords:</strong> ${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
        <span class="popup-prioridad ${p}" style="background:${getColor(p)}22;color:${getColor(p)}">
          ${r.prioridad || 'Baja'}
        </span>
      `);

      marker.addTo(mapa);
      markers.push(marker);
      bounds.push([lat, lng]);
    });

    if (bounds.length > 0) mapa.fitBounds(bounds, { padding: [40, 40] });
  }

  function actualizarStats(datos) {
    document.getElementById('cnt-alta').textContent = datos.filter(r => getPrioridad(r.prioridad) === 'alta').length;
    document.getElementById('cnt-media').textContent = datos.filter(r => getPrioridad(r.prioridad) === 'media').length;
    document.getElementById('cnt-baja').textContent = datos.filter(r => getPrioridad(r.prioridad) === 'baja').length;
  }

  function filtrar(tipo, btn) {
    filtroActual = tipo;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    let filtrados = reportes;
    if (tipo !== 'todos') {
      filtrados = reportes.filter(r =>
        r.tipo?.toLowerCase().includes(tipo.toLowerCase()) ||
        r.prioridad?.toLowerCase().includes(tipo.toLowerCase())
      );
    }
    renderLista(filtrados);
    renderMapa(filtrados);
  }

  function irA(i) {
    const lista = document.getElementById('lista');
    const cards = lista.querySelectorAll('.reporte-card');
    const r = reportes[i];
    const lat = parseFloat(r.latitud);
    const lng = parseFloat(r.longitud);
    if (!isNaN(lat) && !isNaN(lng)) {
      mapa.setView([lat, lng], 16);
      markers[i]?.openPopup();
    }
  }

  async function cargarDatos() {
    try {
      document.getElementById('btn-actualizar').textContent = '↻ Cargando...';
      const res = await fetch(URL_CSV);
      const texto = await res.text();
      reportes = parsearCSV(texto).filter(r => r.tipo || r.descripcion);
      actualizarStats(reportes);
      renderLista(reportes);
      renderMapa(reportes);
    } catch (e) {
      document.getElementById('lista').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error al cargar datos</p></div>`;
    } finally {
      document.getElementById('btn-actualizar').textContent = '↻ Actualizar';
      document.getElementById('loading').style.display = 'none';
    }
  }

  cargarDatos();
</script>
</body>
</html>
